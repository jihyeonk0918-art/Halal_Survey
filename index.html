<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화장품 할랄 인증 업계 애로사항 설문</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-light: #555;
    --ink-muted: #999;
    --paper: #faf9f7;
    --paper-warm: #f3f0eb;
    --accent: #b5814a;
    --accent-light: #e8d8c4;
    --accent-dark: #7a5530;
    --border: #ddd8d0;
    --section-w: 720px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; line-height: 1.8; min-height: 100vh; }

  .progress-bar-wrap { position: sticky; top: 0; z-index: 100; background: var(--ink); height: 3px; }
  .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

  .survey-body { max-width: var(--section-w); margin: 0 auto; padding: 32px 24px 80px; }

  .section-header { display: flex; align-items: baseline; gap: 16px; padding: 52px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .section-header.visible { opacity: 1; transform: translateY(0); }
  .section-alpha { font-family: 'Noto Serif KR', serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
  .section-title-text { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }

  .q-card { background: #fff; border: 1px solid var(--border); border-radius: 2px; padding: 32px 36px; margin-bottom: 16px; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.2s ease; }
  .q-card.visible { opacity: 1; transform: translateY(0); }
  .q-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.06); }

  .q-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
  .q-num { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--accent); background: var(--accent-light); padding: 3px 8px; border-radius: 2px; white-space: nowrap; margin-top: 3px; flex-shrink: 0; }
  .q-text { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600; line-height: 1.6; color: var(--ink); }
  .q-note { font-size: 11.5px; color: var(--ink-muted); margin-bottom: 16px; }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-label { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; font-size: 13.5px; color: var(--ink-light); transition: all 0.15s ease; line-height: 1.5; }
  .choice-label:hover { border-color: var(--accent); background: var(--accent-light); color: var(--ink); }
  .choice-label input { display: none; }
  .choice-label.selected { border-color: var(--accent); background: var(--accent-light); color: var(--ink); }
  .choice-indicator { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
  .choice-label.selected .choice-indicator, .choice-label:hover .choice-indicator { border-color: var(--accent); background: var(--accent); }
  .choice-indicator::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity 0.15s; }
  .choice-label.selected .choice-indicator::after { opacity: 1; }
  .checkbox-indicator { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
  .choice-label.selected .checkbox-indicator, .choice-label:hover .checkbox-indicator { border-color: var(--accent); background: var(--accent); }
  .checkbox-indicator::after { content: '✓'; font-size: 10px; color: #fff; opacity: 0; transition: opacity 0.15s; }
  .choice-label.selected .checkbox-indicator::after { opacity: 1; }

  .etc-wrap { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border: 1px solid var(--border); border-radius: 2px; font-size: 13.5px; color: var(--ink-light); transition: all 0.15s ease; }
  .etc-wrap:focus-within { border-color: var(--accent); background: var(--accent-light); }
  .etc-input { border: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px; color: var(--ink); outline: none; flex: 1; font-weight: 300; }
  .etc-input::placeholder { color: var(--ink-muted); }

  .scale-wrap { padding: 8px 0; }
  .scale-labels { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--ink-muted); margin-bottom: 12px; }
  .scale-btns { display: flex; gap: 8px; }
  .scale-btn { flex: 1; aspect-ratio: 1; max-width: 52px; border: 1px solid var(--border); border-radius: 2px; background: #fff; font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--ink-muted); cursor: pointer; transition: all 0.15s ease; padding: 0; display: flex; align-items: center; justify-content: center; }
  .scale-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .scale-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  .survey-textarea { width: 100%; border: 1px solid var(--border); border-radius: 2px; padding: 14px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px; font-weight: 300; color: var(--ink); background: #fff; resize: vertical; min-height: 100px; outline: none; transition: border-color 0.15s; line-height: 1.8; }
  .survey-textarea:focus { border-color: var(--accent); }
  .survey-textarea::placeholder { color: var(--ink-muted); }

  .submit-section { padding-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 16px; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .submit-section.visible { opacity: 1; transform: translateY(0); }
  .submit-btn { background: var(--ink); color: var(--paper); border: none; padding: 16px 56px; font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; transition: all 0.2s ease; position: relative; overflow: hidden; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn::after { content: ''; position: absolute; inset: 0; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; }
  .submit-btn:not(:disabled):hover::after { transform: scaleX(1); }
  .submit-btn span { position: relative; z-index: 1; }
  .submit-note { font-size: 11.5px; color: var(--ink-muted); text-align: center; }

  .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .done-msg { display: none; text-align: center; padding: 64px 32px; opacity: 0; transition: opacity 0.5s ease; }
  .done-msg.visible { opacity: 1; }
  .done-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-light); border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 22px; color: var(--accent-dark); }
  .done-msg h2 { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 600; margin-bottom: 12px; color: var(--ink); }
  .done-msg p { font-size: 14px; color: var(--ink-muted); }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: #c0392b; color: #fff; padding: 12px 24px; border-radius: 2px; font-size: 13px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { text-align: center; padding: 32px; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.05em; border-top: 1px solid var(--border); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 600px) { .q-card { padding: 24px 20px; } .scale-btns { gap: 5px; } .scale-btn { font-size: 13px; } }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="survey-body">
  <form id="surveyForm" novalidate>

    <div class="section-header">
      <span class="section-alpha">Section A</span>
      <span class="section-title-text">기업 현황</span>
    </div>

    <div class="q-card">
      <div class="q-head"><span class="q-num">Q1</span><span class="q-text">귀사의 규모를 선택해주세요.</span></div>
      <div class="choices" data-type="radio" data-name="q1">
        <label class="choice-label"><input type="radio" name="q1" value="소기업 (매출액 10억 미만 또는 종업원 10인 미만)"><span class="choice-indicator"></span>소기업 (매출액 10억 미만 또는 종업원 10인 미만)</label>
        <label class="choice-label"><input type="radio" name="q1" value="중소기업 (종업원 10~299인)"><span class="choice-indicator"></span>중소기업 (종업원 10~299인)</label>
        <label class="choice-label"><input type="radio" name="q1" value="중견기업 (종업원 300~999인)"><span class="choice-indicator"></span>중견기업 (종업원 300~999인)</label>
        <label class="choice-label"><input type="radio" name="q1" value="대기업 (종업원 1,000인 이상)"><span class="choice-indicator"></span>대기업 (종업원 1,000인 이상)</label>
      </div>
    </div>

    <div class="q-card">
      <div class="q-head"><span class="q-num">Q2</span><span class="q-text">귀사의 할랄 인증 현황을 선택해주세요.</span></div>
      <div class="choices" data-type="radio" data-name="q2">
        <label class="choice-label"><input type="radio" name="q2" value="이미 할랄 인증을 보유하고 있음"><span class="choice-indicator"></span>이미 할랄 인증을 보유하고 있음</label>
        <label class="choice-label"><input type="radio" name="q2" value="현재 취득 절차 진행 중"><span class="choice-indicator"></span>현재 취득 절차 진행 중</label>
        <label class="choice-label"><input type="radio" name="q2" value="취득을 검토 중이나 아직 시작하지 않음"><span class="choice-indicator"></span>취득을 검토 중이나 아직 시작하지 않음</label>
        <label class="choice-label"><input type="radio" name="q2" value="취득 계획 없음"><span class="choice-indicator"></span>취득 계획 없음</label>
      </div>
    </div>

    <div class="q-card">
      <div class="q-head"><span class="q-num">Q3</span><span class="q-text">할랄 인증을 추진하는 (또는 추진 예정인) 주요 목적은 무엇입니까?</span></div>
      <p class="q-note">* 해당하는 항목을 모두 선택해주세요.</p>
      <div class="choices" data-type="checkbox" data-name="q3">
        <label class="choice-label"><input type="checkbox" name="q3" value="인도네시아 수출 (할랄 인증 의무화 대응)"><span class="checkbox-indicator"></span>인도네시아 수출 (할랄 인증 의무화 대응)</label>
        <label class="choice-label"><input type="checkbox" name="q3" value="말레이시아·중동 등 이슬람 시장 확대"><span class="checkbox-indicator"></span>말레이시아·중동 등 이슬람 시장 확대</label>
        <label class="choice-label"><input type="checkbox" name="q3" value="바이어·파트너사 요구"><span class="checkbox-indicator"></span>바이어·파트너사 요구</label>
        <label class="choice-label"><input type="checkbox" name="q3" value="브랜드 이미지 및 차별화 전략"><span class="checkbox-indicator"></span>브랜드 이미지 및 차별화 전략</label>
        <div class="etc-wrap"><span class="checkbox-indicator" id="etc-q3-ind"></span><span style="font-size:13.5px;color:var(--ink-muted);flex-shrink:0;">기타</span><input class="etc-input" type="text" id="etc-q3" placeholder="직접 입력해주세요"></div>
      </div>
    </div>

    <div class="section-header">
      <span class="section-alpha">Section B</span>
      <span class="section-title-text">인증 절차 및 비용</span>
    </div>

    <div class="q-card">
      <div class="q-head"><span class="q-num">Q4</span><span class="q-text">할랄 인증 취득에 소요되는 비용 수준에 대해 어떻게 생각하십니까?</span></div>
      <div class="scale-wrap">
        <div class="scale-labels"><span>매우 저렴</span><span>매우 부담</span></div>
        <div class="scale-btns" data-name="q4">
          <button type="button" class="scale-btn" data-val="1">1</button>
          <button type="button" class="scale-btn" data-val="2">2</button>
          <button type="button" class="scale-btn" data-val="3">3</button>
          <button type="button" class="scale-btn" data-val="4">4</button>
          <button type="button" class="scale-btn" data-val="5">5</button>
        </div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-head"><span class="q-num">Q5</span>
